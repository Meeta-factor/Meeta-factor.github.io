baseURL = "https://meeta-factor.github.io/"
languageCode = "zh-cn"
title = "Meta的工程日志"
theme = "PaperMod"
[markup.goldmark.renderer]
  unsafe = true

[markup.highlight]
  lineNos = true
  lineNumbersInTable = false
  codeFences = true
  guessSyntax = true

[server]
enableCORS = true



[params]
  ShowReadingTime = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  math = true
  mermaid = true
  customCSS = ["css/extended/custom.css"]
  ShowToc = true
  TocOpen = true

[params.profileMode]
  enabled = true
  title = "Meta的工程日志"
  subtitle = "控制工程本科生，关注从理论到落地的完整闭环。<br>研究方向：控制理论 · 嵌入式系统 · 数学建模。<br>这里持续记录实验复盘、技术笔记与工程思考。"
  imageUrl = "/images/home.jpg"
  imageTitle = ""
  imageWidth = 600
  imageHeight = 450
  buttons = [
    { name = "Control", url = "/control/" },
    { name = "Embedded", url = "/embedded/" },
    { name = "Math", url = "/math/" },
    { name = "Thinking", url = "/thinking/" },
    { name = "Posts", url = "/posts/" }
  ]

[params.assets]
  disableHLJS = true


[menu]

  [[menu.main]]
    name = "Control"
    url = "/control/"
    weight = 1

  [[menu.main]]
    name = "Embedded"
    url = "/embedded/"
    weight = 2

  [[menu.main]]
    name = "Math"
    url = "/math/"
    weight = 3

  [[menu.main]]
    name = "Thinking"
    url = "/thinking/"
    weight = 4
  
  [[menu.main]]
    name = "Posts"
    url = "/posts/"
    weight = 5
